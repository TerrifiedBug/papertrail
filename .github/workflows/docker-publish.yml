name: build-bridge-image

# Tests, then builds the papertrail bridge image and pushes it to GHCR.
# Pull on the homelab with: ghcr.io/<owner>/papertrail:latest

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'server/**'
      - 'firmware/**'                 # bundled into the image + served via OTA -> must rebuild
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # metadata-action lowercases this for GHCR

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install server deps
        run: pip install -r server/requirements.txt -r server/requirements-dev.txt
      - name: Server tests
        working-directory: server
        run: python -m pytest -q
      - name: Firmware host-logic tests
        run: python firmware/test_logic.py

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=ref,event=branch
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .                       # repo root: the Dockerfile COPYs server/
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
